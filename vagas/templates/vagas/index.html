<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagas</title>
</head>
<body>
    <h1>Vagas em andamento</h1>
    {% if vagas %}
        <ul>
            {% for vaga in vagas %}
                <li>
                    <a href="{% url 'vagas:perfil_processo' vaga.id %}">{{vaga.titulo}}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Nenhuma vaga encontrada.</p>
    {% endif %}
</body>
</html>
